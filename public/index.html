<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idea Platform</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Top header: logo + utility links -->
  <header class="app-header">
    <div class="header-inner">
      <a href="#/" class="brand">
        <svg class="brand-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="16" fill="#4f46e5"/>
          <path d="M16 8a5 5 0 0 1 3 9.1V19a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-1.9A5 5 0 0 1 16 8z" fill="#fff"/>
          <rect x="13" y="21" width="6" height="1.5" rx="0.75" fill="#fff"/>
          <rect x="13.5" y="23.5" width="5" height="1.5" rx="0.75" fill="#fff"/>
        </svg>
        <span class="brand-name">Idea Platform</span>
      </a>
      <nav class="header-nav" id="header-nav">
        <button class="nav-tab" data-view="focus-areas" onclick="switchView('focus-areas')">Focus Areas</button>
        <button class="nav-tab" data-view="challenges" onclick="switchView('challenges')">Challenges</button>
        <button class="nav-tab" data-view="ideas" onclick="switchView('ideas')">Ideas</button>
      </nav>
      <div class="header-util">
        <a href="#" class="util-link" onclick="return false">Help</a>
        <a href="#" class="util-link btn-login" onclick="return false">Login</a>
      </div>
    </div>
  </header>

  <!-- Breadcrumb strip (shown on detail views) -->
  <div class="breadcrumb-bar" id="breadcrumb-bar" hidden>
    <div class="breadcrumb-inner">
      <nav class="breadcrumb" id="breadcrumb"></nav>
    </div>
  </div>

  <main id="app">
    <div class="loading">Loading…</div>
  </main>

  <!-- Modal for creating/editing -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
